{% extends "base.html" %}
{% block title %}로그인 - WHITE MARKET{% endblock %}
{% block content %}
<section class="auth-card login-card">
    <p class="eyebrow">WELCOME BACK</p>
    <h1>로그인</h1>
    <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="next" value="{{ next or '' }}">
        <label for="username">아이디</label>
        <input id="username" name="username" required minlength="3" maxlength="20" autocomplete="username">
        <label for="password">비밀번호</label>
        <input id="password" type="password" name="password" required maxlength="128" autocomplete="current-password">
        <button type="submit">로그인</button>
    </form>
    <p class="helper login-join-helper">계정이 없나요? <a href="{{ url_for('signup') }}">회원가입</a></p>
</section>
{% endblock %}
