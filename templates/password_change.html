{% extends "base.html" %}
{% block title %}비밀번호 변경 - WHITE MARKET{% endblock %}
{% block content %}
<section class="auth-card password-card">
    <p class="eyebrow">ACCOUNT SECURITY</p>
    <h1>비밀번호 변경</h1>
    <p class="policy-lead">현재 비밀번호를 확인한 뒤 새 비밀번호로 변경합니다. 변경이 완료되면 모든 세션을 종료하고 다시 로그인해야 합니다.</p>
    <form method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label for="current_password">현재 비밀번호</label>
        <input id="current_password" type="password" name="current_password" required maxlength="128" autocomplete="current-password">
        <label for="new_password">새 비밀번호</label>
        <input id="new_password" type="password" name="new_password" required minlength="10" maxlength="128" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{10,128}" title="영문 대문자·소문자, 숫자, 특수문자를 각각 1개 이상 포함하세요." autocomplete="new-password">
        <p class="field-help">10자 이상이며 영문 대문자·소문자, 숫자, 특수문자를 각각 1개 이상 포함하세요.</p>
        <label for="new_password_confirm">새 비밀번호 확인</label>
        <input id="new_password_confirm" type="password" name="new_password_confirm" required minlength="10" maxlength="128" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{10,128}" title="영문 대문자·소문자, 숫자, 특수문자를 각각 1개 이상 포함하세요." autocomplete="new-password">
        <button type="submit">비밀번호 변경</button>
    </form>
    <a class="back-link" href="{{ url_for('profile') }}">← 마이페이지로 돌아가기</a>
</section>
{% endblock %}
